<!DOCTYPE html>
<html>

<head>
    <title>Clarity</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: monospace;
            background: #1a1a1a;
            color: #ddd;
            margin: 0;
            padding: 12px;
            font-size: 13px;
        }
        button, input, select {
            font-family: monospace;
            font-size: 12px;
            background: #111;
            color: #ddd;
            border: 1px solid #555;
            padding: 3px 6px;
        }
        button:hover { background: #333; }
        label { margin-right: 6px; font-size: 12px; color: #ddd; }
        canvas {
            display: block;
            margin: 20px auto;
            border: 1px solid #333;
            box-shadow: 0 0 16px 2px rgba(0,0,0,0.8);
        }
        #controls, .info {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
            justify-content: center;
            margin: 10px 0;
        }
        p {
            text-align: center;
            color: #888;
            font-size: 12px;
            margin: 8px 0;
        }
        input[type="checkbox"] { vertical-align: middle; }
    </style>

    <script type="text/javascript" src="Clarity.js"></script>
</head>

<body>
    <canvas id="canvas"></canvas>

    <p>Use the left, right and up arrow keys to move.</p>
    <div id="level-info" style="text-align:center;font-size:12px;color:#888;margin:4px 0;"></div>

    <div id="controls">
        <label for="map-select">Map:</label>
        <select id="map-select"></select>
        <button onclick="loadSelected()">Load</button>

        <input type="file" id="file-input" accept=".js">
        <button onclick="loadFile()">Load File</button>

        <input type="text" id="url-input" placeholder="Enter map URL...">
        <button onclick="loadURL()">Load from URL</button>

        <label>
            <input type="checkbox" id="viewport" onclick="game.limit_viewport=this.checked;" checked/> Confine viewport
        </label>
    </div>

    <script type="text/javascript">

        window.requestAnimFrame =
            window.requestAnimationFrame ||
            window.webkitRequestAnimationFrame ||
            window.mozRequestAnimationFrame ||
            window.oRequestAnimationFrame ||
            window.msRequestAnimationFrame ||
            function(callback) {
                return window.setTimeout(callback, 1000 / 60);
        };

        var canvas = document.getElementById('canvas'),
            ctx    = canvas.getContext('2d');

        canvas.width = 400;
        canvas.height = 400;

        var game = new Clarity();
        game.set_viewport(canvas.width, canvas.height);

        var _origLoadMap = game.load_map.bind(game);
        game.load_map = function (map) {
            var ret = _origLoadMap(JSON.parse(JSON.stringify(map)));
            updateLevelInfo();
            return ret;
        };

        function loadMapData(data) {
            game.modularData = null;
            game.source_map = JSON.parse(JSON.stringify(data));
            game.load_map(data);
            game.limit_viewport = true;
        }

        function loadModularData(data) {
            game.modularData = JSON.parse(JSON.stringify(data));
            game.modularIndex = 0;
            game.loadModularMap(0);
        }

        function updateLevelInfo() {
            var info = document.getElementById('level-info');
            if (!info) return;
            if (game.modularData && game.current_map) {
                info.textContent = game.modularData.name + ' — ' + (game.current_map.name || 'Level ' + (game.modularIndex + 1)) + ' (' + (game.modularIndex + 1) + '/' + game.modularData.maps.length + ')';
            } else if (game.current_map) {
                info.textContent = game.current_map.name || '';
            } else {
                info.textContent = '';
            }
        }

        function loadMap(url) {
            var old = document.getElementById('map-script');
            if (old) old.remove();
            var script = document.createElement('script');
            script.id = 'map-script';
            script.src = url;
            document.head.appendChild(script);
        }

        function mapManifest(list) {
            var sel = document.getElementById('map-select');
            list.forEach(function (m) {
                var opt = document.createElement('option');
                opt.value = m.file.indexOf('://') !== -1 || m.file.indexOf('//') === 0 ? m.file : 'maps/' + m.file;
                opt.textContent = m.name;
                sel.appendChild(opt);
            });
            if (list.length > 0) {
                var first = list[0].file;
                loadMap(first.indexOf('://') !== -1 || first.indexOf('//') === 0 ? first : 'maps/' + first);
            }
        }

        function loadSelected() {
            var sel = document.getElementById('map-select');
            if (sel.value) loadMap(sel.value);
        }

        function loadFile() {
            var file = document.getElementById('file-input').files[0];
            if (!file) return;
            loadMap(URL.createObjectURL(file));
        }

        function loadURL() {
            var url = document.getElementById('url-input').value.trim();
            if (url) loadMap(url);
        }

        var manifestScript = document.createElement('script');
        manifestScript.src = 'maps/manifest.js';
        document.head.appendChild(manifestScript);

        var lastTime = performance.now();
        var Loop = function() {

            var now = performance.now();
            var elapsed = now - lastTime;
            game.dt = Math.min(elapsed / (1000 / 60), 3);
            if (elapsed > 200) game.dt = 1;
            lastTime = now;

            ctx.fillStyle = game.current_map ? game.current_map.background : '#333';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (game.current_map) {
                game.update();
                game.draw(ctx);
            }

            window.requestAnimFrame(Loop);
        };

        Loop();
        
    </script>
</body>

</html>
